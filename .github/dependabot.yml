version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Guayaquil
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:30'
      timezone: America/Guayaquil
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    groups:
      angular:
        patterns:
          - '@angular/*'
          - angular-eslint
      test-tooling:
        patterns:
          - '@playwright/*'
          - jasmine-core
          - karma
          - 'karma-*'
