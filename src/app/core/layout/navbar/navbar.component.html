<nav
  class="navbar navbar-expand-lg bg-body-tertiary shadow sticky-top py-2"
  aria-label="Primary navigation"
>
  <div class="container-fluid">
    <a
      (click)="closeMenu()"
      routerLink="/about-us"
      class="navbar-brand d-flex align-items-center gap-2"
    >
      <img
        [src]="company.logo"
        [alt]="company.name"
        fetchpriority="high"
        decoding="async"
        height="50"
        class="rounded-circle border border-3 border-white object-fit-cover"
        width="50"
      />
      <span class="fw-bold fs-5 text-success">{{ company.name }}</span>
    </a>

    <button
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-controls="navbarNavigation"
      aria-label="Toggle navigation"
      class="navbar-toggler"
      type="button"
    >
      <app-icon [decorative]="true" [name]="isMenuOpen() ? 'close' : 'menu'" [size]="24"></app-icon>
    </button>

    <div [class.show]="isMenuOpen()" class="collapse navbar-collapse" id="navbarNavigation">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            (click)="closeMenu()"
            [routerLinkActiveOptions]="{ exact: true }"
            ariaCurrentWhenActive="page"
            routerLinkActive="active"
            routerLink="/home"
            class="nav-link text-center px-3"
          >
            Home
          </a>
        </li>

        <li class="nav-item">
          <a
            (click)="closeMenu()"
            [routerLinkActiveOptions]="{ exact: false }"
            ariaCurrentWhenActive="page"
            routerLinkActive="active"
            routerLink="/gallery"
            class="nav-link text-center px-3"
          >
            Products
          </a>
        </li>

        <li class="nav-item">
          <a
            (click)="closeMenu()"
            [routerLinkActiveOptions]="{ exact: true }"
            ariaCurrentWhenActive="page"
            routerLinkActive="active"
            routerLink="/about-us"
            class="nav-link text-center px-3"
          >
            About us
          </a>
        </li>
      </ul>

      <div class="d-grid">
        <button (click)="openContact()" class="btn btn-success px-4" type="button">Contact</button>
      </div>
    </div>
  </div>
</nav>
