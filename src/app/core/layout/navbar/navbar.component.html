<nav class="navbar navbar-expand-lg bg-body-tertiary shadow sticky-top py-2" aria-label="Primary navigation">
  <div class="container-fluid">
    <a
      routerLink="/about-us"
      class="navbar-brand d-flex align-items-center gap-2"
      (click)="closeMenu()"
    >
      <img
        [src]="company.logo"
        [alt]="company.name"
        class="rounded-circle border border-3 border-white object-fit-cover"
        width="50"
        height="50"
        decoding="async"
        fetchpriority="high"
      >
      <span class="fw-bold fs-5 text-success">{{ company.name }}</span>
    </a>

    <button
      type="button"
      class="navbar-toggler"
      aria-controls="navbarNavigation"
      aria-label="Toggle navigation"
      [attr.aria-expanded]="isMenuOpen()"
      (click)="toggleMenu()"
    >
      <app-icon
        [decorative]="true"
        [name]="isMenuOpen() ? 'close' : 'menu'"
        [size]="24"
      ></app-icon>
    </button>

    <div id="navbarNavigation" class="collapse navbar-collapse" [class.show]="isMenuOpen()">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            routerLink="/home"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            ariaCurrentWhenActive="page"
            class="nav-link text-center px-3"
            (click)="closeMenu()"
          >
            Home
          </a>
        </li>

        <li class="nav-item">
          <a
            routerLink="/gallery"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }"
            ariaCurrentWhenActive="page"
            class="nav-link text-center px-3"
            (click)="closeMenu()"
          >
            Products
          </a>
        </li>

        <li class="nav-item">
          <a
            routerLink="/about-us"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            ariaCurrentWhenActive="page"
            class="nav-link text-center px-3"
            (click)="closeMenu()"
          >
            About us
          </a>
        </li>
      </ul>

      <div class="d-grid">
        <button type="button" class="btn btn-success px-4" (click)="openContact()">
          Contact
        </button>
      </div>
    </div>
  </div>
</nav>
