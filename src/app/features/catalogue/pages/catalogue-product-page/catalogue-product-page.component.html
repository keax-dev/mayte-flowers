<main class="product-page py-4 py-lg-5">
  @if (productData(); as currentProduct) {
    <article
      class="container card border-0 rounded-4 shadow-lg overflow-hidden"
      aria-labelledby="product-title"
    >
      <div class="row g-0">
        <aside class="col-12 col-lg-4 bg-body-tertiary p-3 p-md-4">
          <button
            (click)="goBack()"
            class="btn btn-outline-secondary d-inline-flex align-items-center"
            type="button"
          >
            <app-icon [decorative]="true" [size]="20" class="me-2" name="arrow-left"></app-icon>
            Go back
          </button>

          <img
            [src]="currentProduct.image"
            [alt]="currentProduct.name"
            fetchpriority="high"
            decoding="async"
            class="img-fluid rounded-3 d-block mx-auto my-4"
          />

          <div class="d-none d-lg-block mt-3" aria-label="Contact links">
            <app-social-links
              (linkClicked)="trackSocialClick($event)"
              [layout]="socialLayout()"
            ></app-social-links>
          </div>
        </aside>

        <section class="col-12 col-lg-8 p-4 p-md-5" aria-labelledby="product-title">
          <h1 id="product-title" class="display-4 fw-bold">
            {{ currentProduct.name }}
          </h1>
          <hr class="border-success opacity-50 my-4" />
          <p class="lead lh-lg">{{ currentProduct.description }}</p>

          <app-product-quote-panel
            (whatsappClicked)="trackWhatsappQuote()"
            (quoteRequested)="openQuoteDialog()"
            [productName]="currentProduct.name"
            [whatsappUrl]="productWhatsappUrl()"
          ></app-product-quote-panel>

          <app-product-commercial-details
            [highlights]="commercialHighlights()"
            [idealFor]="idealFor()"
          ></app-product-commercial-details>

          @if (hasMetadata()) {
            <hr class="border-success opacity-50 my-4" />
          }

          <app-product-specifications [product]="currentProduct"></app-product-specifications>

          @if (isGypsophila()) {
            <app-gypsophila-packing-table></app-gypsophila-packing-table>
          }
        </section>
      </div>
    </article>
  }
</main>
