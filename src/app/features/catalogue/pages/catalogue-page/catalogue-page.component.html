<main class="main-content row justify-content-center align-items-center m-0">
  <section
    class="col my-5 d-flex flex-wrap align-items-center justify-content-center text-center app-animate-in"
    aria-labelledby="catalogue-title"
  >
    <h1 id="catalogue-title" class="visually-hidden">ALX Garden product catalogue</h1>

    @for (category of cards(); track category.slug) {
      <article class="card m-3" style="width: 18rem;">
        <img [src]="category.image" class="card-img-top" [alt]="category.name" loading="lazy" decoding="async">

        <div class="card-body pt-1">
          <h2 class="app-mono-text m-0 fw-bolder text-dark">{{ category.name }}</h2>

          <a [routerLink]="category.route" class="app-cta-button app-cta-button--compact btn px-4 py-2 lead w-75">
            SHOW
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </a>
        </div>
      </article>
    }
  </section>
</main>
