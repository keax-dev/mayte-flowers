<main class="main-content row justify-content-center align-items-center m-0">
  <section
    class="col position-relative d-flex flex-column align-items-center justify-content-center text-center app-animate-in"
    aria-labelledby="about-title"
  >
    <h1 id="about-title" class="visually-hidden">About ALX Garden</h1>

    <img
      [src]="company.logo"
      [alt]="company.name"
      class="img-logo app-pulse-slow position-relative mb-3 mb-4 rounded-circle shadow-lg"
      decoding="async"
      fetchpriority="high"
    >

    <p class="efect-maquina letters-efect app-mono-text position-relative fs-4 fw-bolder text-light">
      {{ company.tagline }}
    </p>

    <p class="letters-efect app-mono-text position-relative fs-4 fw-bolder text-light">
      {{ company.openingHours }}
    </p>

    <app-social-links class="app-slide-up"></app-social-links>

    <div class="wrapper">
      <button type="button" class="app-cta-button btn px-4 py-2 lead" (click)="openContact()">
        CONTACT US
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </section>
</main>
