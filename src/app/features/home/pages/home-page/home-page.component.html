<main class="home-page d-flex align-items-center py-5">
  <section class="container" aria-labelledby="home-hero-title">
    <div class="row g-4 align-items-center rounded-5 bg-white bg-opacity-10 shadow-lg p-3 p-md-4">
      <div class="col-12 col-lg-7">
        <div class="ratio ratio-4x3 overflow-hidden rounded-4">
          <img
            [src]="currentSlide().image"
            class="h-100 w-100 object-fit-cover"
            [alt]="currentSlide().title"
            decoding="async"
            fetchpriority="high"
          >
        </div>
      </div>

      <header class="col-12 col-lg-5 text-light">
        <p class="text-uppercase text-light opacity-75 fw-semibold small mb-2">
          Premium flowers
        </p>
        <h1 id="home-hero-title" class="display-3 fw-bold">{{ currentSlide().title }}</h1>
        <p class="lead lh-lg">{{ currentSlide().description }}</p>

        <div class="d-grid d-sm-flex gap-2 mt-4">
          <a
            routerLink="/gallery"
            class="btn btn-success btn-lg px-4"
            (click)="trackCatalogueCta()"
          >
            Browse catalogue
          </a>

          <button type="button" class="btn btn-outline-light btn-lg px-4" (click)="openQuoteDialog()">
            Request quote
          </button>
        </div>

        <div class="d-flex flex-wrap gap-2 mt-4" aria-label="Buyer focus">
          <span class="badge rounded-pill text-bg-light p-2">Wholesalers</span>
          <span class="badge rounded-pill text-bg-light p-2">Importers</span>
          <span class="badge rounded-pill text-bg-light p-2">Event buyers</span>
        </div>
      </header>

      <nav class="col-12 d-flex align-items-center justify-content-between" aria-label="Carousel controls">
        <button
          type="button"
          class="btn btn-outline-light rounded-circle d-inline-flex align-items-center justify-content-center p-2"
          aria-label="Previous slide"
          (click)="previous()"
        >
          <app-icon [decorative]="true" name="chevron-left" [size]="20"></app-icon>
        </button>

        <div class="d-flex gap-2" aria-label="Slide indicators">
          @for (slide of slides; track slide.image; let index = $index) {
            <button
              type="button"
              class="btn btn-sm rounded-circle p-1"
              [class.btn-light]="index === activeIndex()"
              [class.btn-outline-light]="index !== activeIndex()"
              [attr.aria-current]="index === activeIndex() ? 'true' : null"
              [attr.aria-label]="'Slide ' + (index + 1)"
              (click)="goTo(index)"
            >
              <span class="visually-hidden">{{ slide.title }}</span>
            </button>
          }
        </div>

        <button
          type="button"
          class="btn btn-outline-light rounded-circle d-inline-flex align-items-center justify-content-center p-2"
          aria-label="Next slide"
          (click)="next()"
        >
          <app-icon [decorative]="true" name="chevron-right" [size]="20"></app-icon>
        </button>
      </nav>
    </div>
  </section>
</main>
