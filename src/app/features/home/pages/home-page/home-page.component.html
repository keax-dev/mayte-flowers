<main class="home-page d-flex align-items-center py-5">
  <section class="container" aria-labelledby="home-hero-title">
    <div class="row g-4 align-items-center rounded-5 bg-white bg-opacity-10 shadow-lg p-3 p-md-4">
      <div class="col-12 col-lg-7">
        <div class="ratio ratio-4x3 overflow-hidden rounded-4">
          <img
            [src]="currentSlide().image"
            [alt]="currentSlide().title"
            fetchpriority="high"
            decoding="async"
            class="h-100 w-100 object-fit-cover"
          />
        </div>
      </div>

      <header class="col-12 col-lg-5 text-light">
        <p class="text-uppercase text-light opacity-75 fw-semibold small mb-2">Premium flowers</p>
        <h1 id="home-hero-title" class="display-3 fw-bold">
          {{ currentSlide().title }}
        </h1>
        <p class="lead lh-lg">{{ currentSlide().description }}</p>

        <div class="d-grid d-sm-flex gap-2 mt-4">
          <a
            (click)="trackCatalogueCta()"
            routerLink="/gallery"
            class="btn btn-success btn-lg px-4"
          >
            Browse catalogue
          </a>

          <button
            (click)="openQuoteDialog()"
            class="btn btn-outline-light btn-lg px-4"
            type="button"
          >
            Request quote
          </button>
        </div>
      </header>

      <nav
        class="col-12 d-flex align-items-center justify-content-between"
        aria-label="Carousel controls"
      >
        <button
          (click)="previous()"
          aria-label="Previous slide"
          class="btn btn-outline-light rounded-circle d-inline-flex align-items-center justify-content-center p-2"
          type="button"
        >
          <app-icon [decorative]="true" [size]="20" name="chevron-left"></app-icon>
        </button>

        <div aria-label="Slide indicators">
          <div class="d-flex gap-2">
            @for (slide of slides; track slide.image; let index = $index) {
              <button
                (click)="goTo(index)"
                [class.btn-outline-light]="index !== activeIndex()"
                [attr.aria-current]="index === activeIndex() ? 'true' : null"
                [attr.aria-label]="'Slide ' + (index + 1)"
                [class.btn-light]="index === activeIndex()"
                [title]="slide.title"
                class="btn btn-sm rounded-circle p-1"
                type="button"
              >
                <span class="visually-hidden">{{ slide.title }}</span>
              </button>
            }
          </div>

          <div class="text-center mt-1">
            <button
              (click)="toggleAutoRotation()"
              [attr.aria-pressed]="!isAutoRotating()"
              [attr.aria-label]="isAutoRotating() ? 'Pause slideshow' : 'Play slideshow'"
              class="btn btn-sm btn-outline-light rounded-circle d-inline-flex align-items-center justify-content-center p-1"
              type="button"
            >
              <app-icon
                [decorative]="true"
                [name]="isAutoRotating() ? 'pause' : 'play'"
                [size]="14"
              ></app-icon>
            </button>
          </div>
        </div>

        <button
          (click)="next()"
          aria-label="Next slide"
          class="btn btn-outline-light rounded-circle d-inline-flex align-items-center justify-content-center p-2"
          type="button"
        >
          <app-icon [decorative]="true" [size]="20" name="chevron-right"></app-icon>
        </button>
      </nav>
    </div>
  </section>
</main>
