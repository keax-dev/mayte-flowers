<ul
  [class.flex-column]="layout() === 'column'"
  [class.flex-wrap]="layout() === 'wrap'"
  class="nav justify-content-center gap-2 p-0"
  aria-label="Social media and contact links"
>
  @for (link of links; track link.label) {
    <li class="nav-item">
      <a
        (click)="trackClick(link.label)"
        [class.btn-secondary]="link.icon === 'location'"
        [class.btn-success]="link.icon === 'whatsapp'"
        [class.btn-danger]="link.icon === 'instagram'"
        [attr.aria-label]="link.label"
        [class.btn-dark]="link.icon === 'phone'"
        [attr.target]="link.openInNewTab ? '_blank' : null"
        [attr.rel]="link.openInNewTab ? 'noopener noreferrer' : null"
        [href]="link.href"
        class="btn rounded-circle d-inline-flex align-items-center justify-content-center p-3 shadow-sm"
      >
        <app-icon
          [decorative]="true"
          [name]="link.icon"
          [size]="layout() === 'row' ? 22 : 28"
        ></app-icon>
      </a>
    </li>
  }
</ul>
